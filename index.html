<!DOCTYPE html>
<html lang="nl-BE">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactief Dashboard: Werfupdate KANAL Brussel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background-color: #f5f5f4; 
            color: #292524;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .zone-btn {
            transition: all 0.2s ease;
        }
        .zone-btn.active {
            background-color: #ea580c; 
            color: white;
            border-color: #ea580c;
            transform: translateX(4px);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .mail-item {
            border-left: 4px solid transparent;
        }
        .mail-item.active {
            border-left-color: #ea580c;
            background-color: #fffaf8;
        }
        .mail-item.unread {
            background-color: #ffffff;
            font-weight: 700;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <header class="bg-stone-900 text-stone-100 py-4 shadow-md border-b-4 border-orange-600">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-2">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white">KANAL – Centre Pompidou</h1>
                <p class="text-stone-400 text-sm">Werfcommunicatie Portaal (CIT Blaton)</p>
            </div>
            <div class="bg-stone-800 px-3 py-1 rounded border border-stone-700 flex items-center gap-2 text-orange-500">
                <span id="current-date" class="text-sm font-bold tracking-widest uppercase">28 Feb 2026</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto px-4 py-6 w-full flex flex-col gap-6">

        <!-- Statistieken -->
        <section class="grid grid-cols-1 sm:grid-cols-4 gap-4">
            <div class="bg-white rounded-xl shadow-sm p-4 border border-stone-200">
                <p class="text-[10px] text-stone-500 uppercase font-bold tracking-wider mb-1">Status Project</p>
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-black text-orange-600">68%</span>
                    <div class="flex-grow bg-stone-100 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-orange-600 h-full w-[68%]"></div>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border border-stone-200">
                <p class="text-[10px] text-stone-500 uppercase font-bold tracking-wider mb-1">Ongelezen</p>
                <p id="unread-count" class="text-2xl font-black text-blue-600">3</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border border-stone-200">
                <p class="text-[10px] text-stone-500 uppercase font-bold tracking-wider mb-1">Veiligheid</p>
                <p class="text-2xl font-black text-green-600">A+</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border border-stone-200">
                <p class="text-[10px] text-stone-500 uppercase font-bold tracking-wider mb-1">Dagen tot deadline</p>
                <p class="text-2xl font-black text-stone-800">46</p>
            </div>
        </section>

        <!-- Mail Layout Inbox -->
        <section class="bg-white rounded-2xl shadow-xl border border-stone-200 overflow-hidden flex flex-col h-[650px]">
            <div class="bg-stone-100 border-b border-stone-200 p-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-orange-600 rounded-full flex items-center justify-center text-white font-bold">In</div>
                    <h2 class="text-sm font-bold text-stone-800 uppercase tracking-widest">Werf Inbox</h2>
                </div>
                <div id="ai-status" class="hidden flex items-center gap-2 text-[10px] font-bold text-orange-600 animate-pulse">
                    <span class="w-2 h-2 bg-orange-600 rounded-full"></span> AI IS AAN HET TYPEN...
                </div>
            </div>
            
            <div class="flex flex-grow overflow-hidden">
                <!-- Mail Lijst -->
                <div id="mail-list" class="w-1/3 border-r border-stone-200 overflow-y-auto bg-stone-50">
                    <!-- Geen berichten? -->
                </div>

                <!-- Mail Detail -->
                <div id="mail-detail" class="w-2/3 flex flex-col bg-white overflow-y-auto relative">
                    <div class="p-16 text-center text-stone-400">
                        <div class="w-20 h-20 bg-stone-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-10 h-10 text-stone-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                        </div>
                        <p class="font-medium">Selecteer een gesprek uit de lijst</p>
                        <p class="text-xs mt-1">Alle werfcommunicatie wordt gearchiveerd.</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Werfzones Tabs -->
        <section class="bg-white rounded-2xl shadow-sm p-6 border border-stone-200">
            <h2 class="text-sm font-bold mb-6 text-stone-400 uppercase tracking-widest">Live Werfzones Update</h2>
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="lg:w-1/4 flex flex-col gap-3">
                    <button class="zone-btn active bg-white border border-stone-200 text-stone-700 text-sm font-bold py-4 px-5 rounded-xl text-left flex justify-between items-center shadow-sm" onclick="showZone('ruwbouw', this)">
                        <span>RUWBOUW</span><span class="text-orange-500 italic">85%</span>
                    </button>
                    <button class="zone-btn bg-white border border-stone-200 text-stone-700 text-sm font-bold py-4 px-5 rounded-xl text-left flex justify-between items-center shadow-sm" onclick="showZone('techniek', this)">
                        <span>TECHNIEKEN</span><span class="text-blue-500 italic">40%</span>
                    </button>
                    <button class="zone-btn bg-white border border-stone-200 text-stone-700 text-sm font-bold py-4 px-5 rounded-xl text-left flex justify-between items-center shadow-sm" onclick="showZone('veiligheid', this)">
                        <span>VEILIGHEID</span><span class="text-green-500 italic">OK</span>
                    </button>
                    <button class="zone-btn bg-white border border-stone-200 text-stone-700 text-sm font-bold py-4 px-5 rounded-xl text-left flex justify-between items-center shadow-sm" onclick="showZone('planning', this)">
                        <span>PLANNING</span><span class="text-stone-500 italic">W12</span>
                    </button>
                </div>
                <div id="zone-content" class="lg:w-3/4 bg-stone-50 rounded-2xl p-8 border border-stone-200 min-h-[350px]"></div>
            </div>
        </section>
    </main>

    <script>
        const apiKey = ""; // API Key wordt door omgeving ingevuld

        let messages = [
            { id: 1, sender: "Dakwerken Peeters", email: "info@peeters-dak.be", subject: "Lek ontdekt Volume 2", date: "Vandaag, 14:22", body: "Beste werfleider, we hebben een probleem bij Volume 2. Door de wind is er een tijdelijke dichting losgekomen. Er is waterinfiltratie. Kunnen we morgenochtend extra ploegen inzetten voor herstel?", unread: true, thread: [] },
            { id: 2, sender: "Holcim Beton", email: "planning@holcim.be", subject: "Vertraging levering Maandag", date: "Vandaag, 09:15", body: "Geachte, wegens een technische storing in onze centrale Grimbergen zal de levering van maandag vertraagd zijn. We verwachten pas rond 11:30 op de werf te zijn. Is dit akkoord?", unread: true, thread: [] },
            { id: 3, sender: "Janssens Elektro", email: "p.janssens@elektro-j.be", subject: "Kabelgoten +2 gereed", date: "Gisteren, 16:45", body: "De kabelgoten op verdieping +2 zijn volledig geplaatst volgens plan. U kunt de keuringsinstantie inlichten voor de tussenkomst van volgende week.", unread: false, thread: [] }
        ];

        async function callGemini(prompt, senderName) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const systemPrompt = `Je bent ${senderName}, een professionele onderaannemer of leverancier op de werf KANAL Brussel. 
            De gebruiker is de werfleider van CIT Blaton. 
            Reageer kort, zakelijk en constructief op het laatste bericht van de werfleider. 
            Als er een goedkeuring is gegeven, bevestig dan de planning. Als er een vraag is gesteld, beantwoord deze.
            Blijf in je rol als ${senderName}. Gebruik een normale e-mail toon in het Nederlands.`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error('API Error');
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (i === 4) return "Fout bij laden van reactie. Probeer het later opnieuw.";
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function renderMailList() {
            const list = document.getElementById('mail-list');
            const unreadDisplay = document.getElementById('unread-count');
            let unreadCount = 0;
            
            list.innerHTML = messages.map(m => {
                if(m.unread) unreadCount++;
                return `
                <div onclick="openMail(${m.id})" class="mail-item p-4 border-b border-stone-200 cursor-pointer hover:bg-white transition-all ${m.unread ? 'unread' : ''}" id="mail-item-${m.id}">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm text-stone-800 truncate pr-2">${m.sender}</span>
                        <span class="text-[10px] text-stone-400 whitespace-nowrap">${m.date.split(',')[1] || m.date}</span>
                    </div>
                    <div class="text-xs text-orange-600 truncate mb-1">${m.subject}</div>
                    <div class="text-[11px] text-stone-400 truncate">${m.body.substring(0, 40)}...</div>
                </div>`;
            }).join('');
            unreadDisplay.innerText = unreadCount;
        }

        function openMail(id) {
            const mail = messages.find(m => m.id === id);
            mail.unread = false;
            renderMailList();
            
            document.querySelectorAll('.mail-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`mail-item-${id}`).classList.add('active');

            const threadHtml = mail.thread.map(t => `
                <div class="mb-4 ${t.role === 'user' ? 'ml-8' : 'mr-8'}">
                    <div class="text-[10px] font-bold text-stone-400 uppercase mb-1">${t.role === 'user' ? 'U (Werfleider)' : mail.sender}</div>
                    <div class="${t.role === 'user' ? 'bg-orange-50 border-orange-100' : 'bg-stone-50 border-stone-100'} p-3 rounded-lg border text-sm shadow-sm whitespace-pre-wrap">${t.text}</div>
                </div>
            `).join('');

            document.getElementById('mail-detail').innerHTML = `
                <div class="p-6 fade-in flex flex-col h-full">
                    <div class="border-b pb-4 mb-6">
                        <h3 class="text-xl font-bold text-stone-800">${mail.subject}</h3>
                        <div class="flex items-center gap-2 mt-2">
                            <div class="w-6 h-6 bg-stone-200 rounded-full flex items-center justify-center text-[10px] font-bold">${mail.sender[0]}</div>
                            <span class="text-xs font-bold">${mail.sender}</span>
                            <span class="text-xs text-stone-400">&lt;${mail.email}&gt;</span>
                        </div>
                    </div>
                    
                    <div class="flex-grow overflow-y-auto pr-2 mb-6">
                        <div class="mb-6 mr-8">
                            <div class="text-[10px] font-bold text-stone-400 uppercase mb-1">${mail.sender}</div>
                            <div class="bg-stone-50 border border-stone-100 p-4 rounded-lg text-sm shadow-sm whitespace-pre-wrap">${mail.body}</div>
                        </div>
                        ${threadHtml}
                        <div id="thread-anchor"></div>
                    </div>

                    <div class="border-t pt-4 bg-white sticky bottom-0">
                        <div class="relative">
                            <textarea id="reply-text" class="w-full h-24 p-4 border-2 border-stone-100 rounded-xl text-sm focus:border-orange-500 outline-none transition-all resize-none" placeholder="Klik hier om te antwoorden op ${mail.sender}..."></textarea>
                            <button onclick="sendReply(${id})" class="absolute bottom-3 right-3 bg-stone-900 text-white text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-lg hover:bg-orange-600 transition-colors">Verzenden</button>
                        </div>
                    </div>
                </div>
            `;
            const anchor = document.getElementById('thread-anchor');
            anchor.scrollIntoView({ behavior: 'smooth' });
        }

        async function sendReply(id) {
            const text = document.getElementById('reply-text').value;
            if(!text.trim()) return;

            const mail = messages.find(m => m.id === id);
            mail.thread.push({ role: 'user', text: text });
            
            // Re-render
            openMail(id);
            
            // AI Response logic
            document.getElementById('ai-status').classList.remove('hidden');
            
            const context = `Context van het gesprek:\nOrigineel bericht: ${mail.body}\n${mail.thread.map(t => `${t.role}: ${t.text}`).join('\n')}`;
            const aiReply = await callGemini(context, mail.sender);
            
            setTimeout(() => {
                mail.thread.push({ role: 'ai', text: aiReply });
                document.getElementById('ai-status').classList.add('hidden');
                openMail(id);
            }, 1000);
        }

        function refreshInbox() { renderMailList(); }

        const zoneData = {
            ruwbouw: { title: "Ruwbouw & Structuur", content: `<div class="fade-in space-y-4 text-sm text-stone-600"><p>Betonwerken auditorium: 85% voltooid. Focus op het ontkisten van de hoofdbalken.</p><div class="bg-white p-4 rounded-xl border">Status: Goed op schema. Volgende gieting voorzien voor dinsdag 08:00.</div></div>` },
            techniek: { title: "Technieken & HVAC", content: `<div class="fade-in space-y-4 text-sm text-stone-600"><p>Ventilatiekanalen verdieping +1 zijn voor 40% geplaatst.</p><div class="bg-blue-50 p-4 rounded-xl border border-blue-100 text-blue-800 font-bold">Aandacht: Levering warmtepompen vertraagd tot week 14.</div></div>` },
            veiligheid: { title: "VGM Status", content: `<div class="fade-in grid grid-cols-2 gap-4"><div class="bg-green-50 p-6 rounded-xl border border-green-200 text-center"><p class="text-[10px] font-bold text-green-700 uppercase">LTI Vrije Dagen</p><p class="text-4xl font-black text-green-800">412</p></div><div class="bg-white p-6 rounded-xl border border-stone-200 text-center"><p class="text-[10px] font-bold text-stone-500 uppercase">Inbreuken</p><p class="text-4xl font-black text-stone-800">0</p></div></div>` },
            planning: { title: "Project Planning", content: `<div class="fade-in space-y-2"><div class="flex items-center gap-4 p-3 bg-white rounded-lg border"><span class="w-8 h-8 rounded bg-orange-100 flex items-center justify-center font-bold">W12</span><span class="text-sm">Start dakdichting Volume 3</span></div><div class="flex items-center gap-4 p-3 bg-white rounded-lg border opacity-40"><span class="w-8 h-8 rounded bg-stone-100 flex items-center justify-center font-bold">W15</span><span class="text-sm">Oplevering Winddicht</span></div></div>` }
        };

        function showZone(key, btn) {
            document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const data = zoneData[key];
            document.getElementById('zone-content').innerHTML = `
                <h3 class="text-lg font-black text-stone-800 mb-6 tracking-tight">${data.title}</h3>
                ${data.content}
            `;
        }

        window.onload = () => {
            renderMailList();
            showZone('ruwbouw', document.querySelector('.zone-btn'));
        };
    </script>
</body>
</html>
